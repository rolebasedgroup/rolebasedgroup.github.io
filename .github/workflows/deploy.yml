name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Debug npm and node versions
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version: $(npm --version)"
          echo "NPM config list:"
          npm config list

      - name: Install dependencies
        run: npm install --loglevel verbose

      - name: Print npm logs on failure
        if: failure()
        run: |
          echo "=== NPM Error Logs ==="
          ls -la /home/runner/.npm/_logs/ || echo "No logs directory"
          cat /home/runner/.npm/_logs/*.log || echo "No log files found"

      - name: Build website
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build